<title>Albion Craft Specs</title>

<!--
=====================================================
PROYECTO:
- editor.html  -> Página para editar specs
- index.html   -> Página pública reflejo en tiempo real
- Firebase Firestore -> Guardado online en tiempo real
=====================================================

INSTRUCCIONES:

1. Crear proyecto en Firebase:
   https://firebase.google.com/

2. Activar Firestore Database

3. Reemplazar FIREBASE_CONFIG con tus datos.

4. Crear 2 archivos:
   - editor.html
   - index.html

5. Copiar el código correspondiente.
=====================================================
-->

</head>
<body>

<!-- ===================================================== -->
<!-- ==================== editor.html ==================== -->
<!-- ===================================================== -->

<!--
GUARDAR COMO: editor.html
-->

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
import {
  getFirestore,
  doc,
  setDoc,
  onSnapshot
} from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "FIREBASE_CONFIG",
  authDomain: "FIREBASE_CONFIG",
  projectId: "FIREBASE_CONFIG",
  storageBucket: "FIREBASE_CONFIG",
  messagingSenderId: "FIREBASE_CONFIG",
  appId: "FIREBASE_CONFIG"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const ref = doc(db, "albion", "specs");

let data = {
  Guerrero: {},
  Cazador: {},
  Mago: {}
};

onSnapshot(ref, (snap) => {
  if (snap.exists()) {
    data = snap.data();
    render();
  }
});

window.addSpec = async function(){

  const clase = document.getElementById('clase').value;
  const categoria = document.getElementById('categoria').value;
  const nombre = document.getElementById('nombre').value;

  if(!clase || !categoria || !nombre) return;

  if(!data[clase]) data[clase] = {};
  if(!data[clase][categoria]) data[clase][categoria] = [];

  data[clase][categoria].push({
    nombre,
    spec: 0
  });

  await setDoc(ref, data);

  document.getElementById('nombre').value = '';
}

window.updateSpec = async function(clase,categoria,index,valor){

  data[clase][categoria][index].spec = parseInt(valor);

  await setDoc(ref, data);
}

window.deleteSpec = async function(clase,categoria,index){

  data[clase][categoria].splice(index,1);

  await setDoc(ref, data);
}

function render(){

  const container = document.getElementById('list');
  container.innerHTML = '';

  for(const clase in data){

    const classDiv = document.createElement('div');
    classDiv.className = 'classBox';

    classDiv.innerHTML = `<h2>${clase}</h2>`;

    for(const categoria in data[clase]){

      const catDiv = document.createElement('div');
      catDiv.className = 'catBox';

      catDiv.innerHTML = `<h3>${categoria}</h3>`;

      data[clase][categoria].forEach((item,index)=>{

        const row = document.createElement('div');
        row.className = 'row';

        row.innerHTML = `
          <span>${item.nombre}</span>

          <input
            type="number"
            min="0"
            max="100"
            value="${item.spec}"
            onchange="updateSpec('${clase}','${categoria}',${index},this.value)"
          >

          <button onclick="deleteSpec('${clase}','${categoria}',${index})">
            Eliminar
          </button>
        `;

        catDiv.appendChild(row);
      });

      classDiv.appendChild(catDiv);
    }

    container.appendChild(classDiv);
  }
}

</script>

<style>

<div class="panel">

  <h1>Editor Albion Specs</h1>

  <select id="clase">
    <option value="Guerrero">Guerrero</option>
    <option value="Cazador">Cazador</option>
    <option value="Mago">Mago</option>
  </select>

  <input id="categoria" placeholder="Hachas, Espadas, Bastones...">

  <input id="nombre" placeholder="Nombre del arma o pieza">

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
import {
  getFirestore,
  doc,
  onSnapshot
} from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "FIREBASE_CONFIG",
  authDomain: "FIREBASE_CONFIG",
  projectId: "FIREBASE_CONFIG",
  storageBucket: "FIREBASE_CONFIG",
  messagingSenderId: "FIREBASE_CONFIG",
  appId: "FIREBASE_CONFIG"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const ref = doc(db, "albion", "specs");

onSnapshot(ref, (snap)=>{

  if(!snap.exists()) return;

  render(snap.data());
});

function render(data){

  const container = document.getElementById('viewer');
  container.innerHTML = '';

  for(const clase in data){

    const classDiv = document.createElement('div');
    classDiv.className = 'classBox';

    classDiv.innerHTML = `<h2>${clase}</h2>`;

    for(const categoria in data[clase]){

      const catDiv = document.createElement('div');
      catDiv.className = 'catBox';

      catDiv.innerHTML = `<h3>${categoria}</h3>`;

      data[clase][categoria].forEach((item)=>{

        const row = document.createElement('div');
        row.className = 'row';

        row.innerHTML = `
          <span>${item.nombre}</span>
          <b>${item.spec}/100</b>
        `;

        catDiv.appendChild(row);
      });

      classDiv.appendChild(catDiv);
    }

    container.appendChild(classDiv);
  }
}

</script>

<style>
body{
  background:#0f1115;
  color:white;
  font-family:Arial;
  padding:20px;
}

.classBox{
  margin-bottom:30px;
}

.catBox{
  background:#1a1d25;
  border-radius:12px;
  padding:15px;
  margin-bottom:15px;
}

.row{
  display:flex;
  justify-content:space-between;
  margin:8px 0;
  padding:10px;
  background:#232938;
  border-radius:8px;
}
</style>

<h1>Albion Crafter Specs</h1>

<div id="viewer"></div>

</body>
