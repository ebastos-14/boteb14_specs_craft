<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Albion Specs</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#0f1115;
    color:white;
    font-family:Arial;
    padding:20px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(12,1fr);
    gap:12px;
}

.card{
    background:#1b1f2a;
    border-radius:12px;
    overflow:hidden;
    min-height:180px;
    display:flex;
    flex-direction:column;
}

.card.hidden{
    opacity:0;
    pointer-events:none;
}

.card img{
    width:100%;
    height:120px;
    object-fit:cover;
    background:#222;
}

.cardContent{
    padding:10px;
}

.cardTitle{
    font-size:14px;
    margin-bottom:6px;
}

.cardTotal{
    font-size:18px;
    font-weight:bold;
}

</style>
</head>
<body>

<h1 style="margin-bottom:20px;">Albion Crafter Specs</h1>

<div class="grid" id="grid"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
import {
    getFirestore,
    doc,
    onSnapshot
} from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "TU_API_KEY",
    authDomain: "TU_AUTH_DOMAIN",
    projectId: "TU_PROJECT_ID",
    storageBucket: "TU_STORAGE_BUCKET",
    messagingSenderId: "TU_MESSAGING_ID",
    appId: "TU_APP_ID"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const ref = doc(db,"albion","specs");

function totalSpecs(slot){

    return slot.specs.reduce((a,b)=>a+b.value,0);

}

onSnapshot(ref,(snap)=>{

    if(!snap.exists()) return;

    render(snap.data().grid);

});

function render(data){

    const grid = document.getElementById('grid');

    grid.innerHTML = '';

    data.forEach((slot)=>{

        const div = document.createElement('div');

        div.className = 'card';

        if(!slot.visible){
            div.classList.add('hidden');
        }

        div.innerHTML = `
            <img src="${slot.image || ''}">
            <div class="cardContent">
                <div class="cardTitle">${slot.title}</div>
                <div class="cardTotal">${totalSpecs(slot)} / 800</div>
            </div>
        `;

        grid.appendChild(div);

    });

}

</script>

</body>
</html>
