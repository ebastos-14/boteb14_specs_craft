<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Albion Index</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#0f1115;
    color:white;
    font-family:Arial;
    padding:20px;
}

h1{
    margin-bottom:20px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(10,1fr);
    gap:12px;
}

/* SLOT FIJO */
.category{
    background:#1b1f2a;
    border-radius:14px;
    overflow:hidden;
    border:2px solid transparent;
}

/* OCULTO PERO OCUPA ESPACIO */
.category.hidden{
    visibility:hidden;
}

/* IMAGEN */
.category img{
    width:100%;
    aspect-ratio:1/1;
    object-fit:cover;
    background:#222;
}

/* INFO */
.categoryInfo{
    padding:10px;
    text-align:center;
}

.categoryName{
    font-size:18px;
    font-weight:bold;
    margin-bottom:6px;
}

.categoryTotal{
    font-size:13px;
    opacity:.8;
}

.loading{
    margin-top:20px;
    opacity:.7;
}

</style>
</head>
<body>

<h1>Albion Index</h1>

<div class="grid" id="grid"></div>

<div class="loading" id="status">
    Cargando datos...
</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";

import {
    getDatabase,
    ref,
    onValue
}
from "https://www.gstatic.com/firebasejs/11.6.1/firebase-database.js";

/* ================= FIREBASE ================= */

const firebaseConfig = {
    apiKey: "TU_API_KEY",
    authDomain: "TU_PROJECT.firebaseapp.com",
    databaseURL: "https://TU_PROJECT-default-rtdb.firebaseio.com",
    projectId: "TU_PROJECT",
    storageBucket: "TU_PROJECT.appspot.com",
    messagingSenderId: "123456",
    appId: "APP_ID"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const dbRef = ref(db,'albionSpecs');

/* ================= DATA ================= */

let data = [];

/* ================= TOTAL ================= */

function total(category){

    if(!category || !category.weapons) return 0;

    return category.weapons.reduce(
        (a,b)=>a + (b.spec || 0),
        0
    );
}

/* ================= RENDER ================= */

function render(){

    const grid =
    document.getElementById('grid');

    grid.innerHTML = '';

    data.forEach((cat)=>{

        const div =
        document.createElement('div');

        div.className = 'category';

        if(!cat.visible){
            div.classList.add('hidden');
        }

        div.innerHTML = `
            <img src="${cat.image || ''}">
            <div class="categoryInfo">
                <div class="categoryName">
                    ${cat.name || ''}
                </div>
                <div class="categoryTotal">
                    ${total(cat)} / 800
                </div>
            </div>
        `;

        grid.appendChild(div);
    });

    document.getElementById('status').innerText =
    'Sincronizado ✔';
}

/* ================= LISTENER REALTIME ================= */

onValue(dbRef,(snapshot)=>{

    if(snapshot.exists()){

        const json = snapshot.val();

        data = json.grid || [];

        render();

    }else{

        document.getElementById('status').innerText =
        'Sin datos en Firebase';
    }
});

</script>

</body>
</html>
